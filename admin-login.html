<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | ReVOUTPAY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background:#f8f9fb;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.login-box {
    width:100%;
    max-width:400px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    border:1px solid #e2e8f0;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

h2 { margin-bottom:20px; }

input {
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #e2e8f0;
    border-radius:8px;
    outline:none;
}

button {
    width:100%;
    padding:12px;
    background:#2f80ed;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

button:hover { opacity:0.9; }

.error {
    color:#e11d48;
    font-size:13px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <div class="error" id="error-msg"></div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB9FhVg5fzw18luwnrvu-X9pDdyl_SanP4",
  authDomain: "revoutpaywallet.firebaseapp.com",
  databaseURL: "https://revoutpaywallet-default-rtdb.firebaseio.com",
  projectId: "revoutpaywallet",
  storageBucket: "revoutpaywallet.firebasestorage.app",
  messagingSenderId: "161385768191",
  appId: "1:161385768191:web:2ee1779a4af28dd36158ca",
  measurementId: "G-FE3ZYY0HLN"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorBox = document.getElementById('error-msg');

    errorBox.innerText = "";

    if (!email || !password) {
        errorBox.innerText = "All fields required";
        return;
    }

    try {
        const userCred = await auth.signInWithEmailAndPassword(email, password);
        const uid = userCred.user.uid;

        // Check if user is admin
        const snap = await db.ref('admins/' + uid).once('value');

        if (snap.exists()) {
            window.location.href = "admin.html";
        } else {
            errorBox.innerText = "Not authorized as admin";
            auth.signOut();
        }

    } catch (e) {
        errorBox.innerText = "Invalid login credentials";
    }
}
</script>

</body>
</html>
