<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Reinasset</title>
    <link rel="stylesheet" href="style.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .reset-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .reset-card i {
            font-size: 40px;
            color: #2f80ed;
            margin-bottom: 20px;
        }
        .reset-card h2 { margin-bottom: 10px; color: #1a1d21; }
        .reset-card p { color: #6b7785; font-size: 14px; margin-bottom: 25px; }
        
        input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1.5px solid #eef2f7;
            border-radius: 12px;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            background: #2f80ed;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #2f80ed;
            text-decoration: none;
            font-size: 14px;
        }
        
        .status-msg { margin-top: 15px; font-size: 13px; display: none; }
        .success { color: #27ae60; }
        .error { color: #eb5757; }
    </style>
</head>
<body>

    <div class="reset-card">
        <i class="fas fa-key"></i>
        <h2>Forgot Password?</h2>
        <p>Enter your email and we'll send you a link to reset your password.</p>
        
        <input type="email" id="resetEmail" placeholder="Enter your email" required>
        
        <button id="btnReset">Send Reset Link</button>
        
        <div id="statusBox" class="status-msg"></div>
        
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>

    <script type="module">
        import { auth } from "./firebase.js";
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const btnReset = document.getElementById('btnReset');
        const statusBox = document.getElementById('statusBox');

        btnReset.onclick = async () => {
            const email = document.getElementById('resetEmail').value.trim();
            
            if(!email) {
                showStatus("Please enter your email address.", "error");
                return;
            }

            btnReset.innerText = "Sending...";
            btnReset.disabled = true;

            try {
                await sendPasswordResetEmail(auth, email);
                showStatus("Success! Check your email inbox (and spam) for the reset link.", "success");
                btnReset.innerText = "Email Sent";
            } catch (error) {
                console.error(error);
                let msg = "Error: Could not send reset email.";
                if(error.code === "auth/user-not-found") msg = "No account found with this email.";
                showStatus(msg, "error");
                btnReset.innerText = "Send Reset Link";
                btnReset.disabled = false;
            }
        };

        function showStatus(text, type) {
            statusBox.innerText = text;
            statusBox.style.display = "block";
            statusBox.className = `status-msg ${type}`;
        }
    </script>
</body>
</html>
